<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บไซต์กำลังปรับปรุง (Under Maintenance)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            /* พื้นหลังไล่สีโทนสว่างดูสบายตา */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }
        .maintenance-card {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 85%;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 25px;
            /* แอนิเมชันให้ไอคอนลอยขึ้นลงเบาๆ */
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 36px;
            color: #2c3e50;
            margin: 0 0 10px;
            font-weight: 600;
        }
        p.main-msg {
            font-size: 22px;
            color: #e74c3c;
            margin: 0 0 25px;
            font-weight: 400;
        }
        p.sub-msg {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
            font-weight: 300;
        }
        /* กำหนดคีย์เฟรมสำหรับแอนิเมชัน */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon">🛠️</div>
        <h1>ปิดปรับปรุงระบบ</h1>
        <p class="main-msg">ขออภัยในความไม่สะดวก</p>
        <p class="sub-msg">เรากำลังดำเนินการปรับปรุงและพัฒนาระบบเพื่อให้การใช้งานดียิ่งขึ้น<br>กรุณากลับมาใช้งานใหม่อีกครั้งในภายหลัง</p>
    </div>
</body>
</html>
